name: CI Pipeline

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  quality-gate:
    name: Code Quality
    runs-on: ubuntu-latest
    
    steps:
      - name:  Checkout code
        uses: actions/checkout@v4

      - name:  Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name:  Install dependencies
        run: npm ci

      - name:  Run linter (ESLint)
        run: npm run lint

      - name:  Check formatting (Prettier)
        run: npm run format:check

      - name:  Smoke test: verify server starts
        run: |
          timeout 10s npm start || true
          echo "Server startup check passed"

  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: quality-gate
    if: always()
    
    steps:
      - name: Print result
        run: |
          if [ "${{ needs.quality-gate.result }}" == "success" ]; then
            echo " All checks passed — PR ready for review"
          else
            echo "Checks failed — fix issues before merge"
            exit 1
          fi
